<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026™ | Quantum Matrix Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; }
        body { background-color: #030305; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-future { font-family: 'Orbitron', sans-serif; }
        
        .cyber-grid {
            position: fixed; inset: 0; z-index: -1;
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0, 242, 254, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.15);
        }

        /* Image hover effect */
        .img-zoom { overflow: hidden; border-radius: 16px; }
        .img-zoom img { transition: transform 0.8s ease; }
        .img-zoom:hover img { transform: scale(1.1) rotate(-1deg); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body class="selection:bg-cyan-500 selection:text-black">

    <div class="cyber-grid"></div>

    <nav class="fixed w-full z-50 glass-card !border-t-0 !border-l-0 !border-r-0 !rounded-none px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-future font-black text-2xl tracking-widest">FIFA<span class="text-[#00f2fe]">AI</span></h1>
            <div class="text-xs font-mono text-cyan-400 bg-cyan-900/30 px-3 py-1 rounded border border-cyan-500/30">
                <i class="fa-solid fa-bolt mr-2 animate-pulse"></i>104 Matches Loaded
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-16 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-black font-future mb-4 uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
            Ultimate Match Engine
        </h1>
        <p class="text-gray-400 max-w-2xl mx-auto">Dynamic JavaScript engine generating 104 AI simulated matches and endless 4K futuristic galleries instantly.</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 mb-20">
        <h2 class="font-future text-2xl font-black mb-8 border-b border-gray-800 pb-4"><i class="fa-solid fa-calendar-days mr-2 text-cyan-400"></i> FULL 104 MATCH TRACKER</h2>
        
        <div id="match-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <section class="max-w-7xl mx-auto px-6 mb-20">
        <h2 class="font-future text-2xl font-black mb-8 border-b border-gray-800 pb-4"><i class="fa-solid fa-camera mr-2 text-cyan-400"></i> AI NEURAL GALLERY</h2>
        
        <div id="gallery-container" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
    </section>

    <script>
        // 1. DYNAMIC MATCH GENERATOR (Simulating 104 Matches without crashing the file)
        const matchContainer = document.getElementById('match-container');
        const teams = [
            { flag: '🇦🇷', name: 'Argentina' }, { flag: '🇧🇷', name: 'Brazil' }, 
            { flag: '🇫🇷', name: 'France' }, { flag: '🇪🇸', name: 'Spain' },
            { flag: '🇩🇪', name: 'Germany' }, { flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', name: 'England' },
            { flag: '🇵🇹', name: 'Portugal' }, { flag: '🇺🇸', name: 'USA' },
            { flag: '🇲🇽', name: 'Mexico' }, { flag: '🇮🇹', name: 'Italy' }
        ];

        // Loop to generate exactly 104 matches automatically
        let matchHTML = '';
        for(let i = 1; i <= 104; i++) {
            // Randomly pick teams and scores
            let team1 = teams[Math.floor(Math.random() * teams.length)];
            let team2 = teams[Math.floor(Math.random() * teams.length)];
            while(team1.name === team2.name) { team2 = teams[Math.floor(Math.random() * teams.length)]; } // Prevent same team
            
            let score1 = Math.floor(Math.random() * 4);
            let score2 = Math.floor(Math.random() * 4);

            matchHTML += `
                <div class="glass-card p-5 relative">
                    <div class="absolute top-0 right-0 bg-cyan-500/20 text-cyan-400 text-[10px] px-2 py-1 rounded-bl-lg font-bold">MATCH ${i}</div>
                    <p class="text-xs text-gray-500 mb-3"><i class="fa-regular fa-clock mr-1"></i> June 2026</p>
                    
                    <div class="flex justify-between items-center">
                        <div class="text-center w-2/5">
                            <span class="text-3xl block">${team1.flag}</span>
                            <span class="font-bold text-sm">${team1.name}</span>
                        </div>
                        
                        <div class="w-1/5 text-center flex flex-col items-center">
                            <span class="text-2xl font-black font-future text-cyan-400">${score1} - ${score2}</span>
                            <span class="text-[9px] text-gray-500 mt-1">FT AI</span>
                        </div>
                        
                        <div class="text-center w-2/5">
                            <span class="text-3xl block">${team2.flag}</span>
                            <span class="font-bold text-sm">${team2.name}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        // Inject all 104 matches into the HTML instantly
        matchContainer.innerHTML = matchHTML;


        // 2. DYNAMIC GALLERY GENERATOR (Loading High-Res Images safely)
        const galleryContainer = document.getElementById('gallery-container');
        const searchTerms = ['stadium', 'soccer', 'futuristic+city', 'crowd', 'trophy'];
        
        let galleryHTML = '';
        // Generate 20 Image blocks dynamically (Change 20 to 500 if needed, but 20 is safe for browsers)
        for(let j = 1; j <= 20; j++) {
            let term = searchTerms[Math.floor(Math.random() * searchTerms.length)];
            // Using a dynamic high-quality image API
            let imgUrl = `https://source.unsplash.com/random/800x600/?${term},neon&sig=${j}`;
            
            galleryHTML += `
                <div class="img-zoom glass-card relative h-48 md:h-64 group">
                    <img src="${imgUrl}" alt="AI Vision" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                        <span class="border border-cyan-400 text-cyan-400 px-3 py-1 font-future text-xs font-bold">VISION 2026 - DATA ${j}</span>
                    </div>
                </div>
            `;
        }
        galleryContainer.innerHTML = galleryHTML;
    </script>
</body>
</html>
